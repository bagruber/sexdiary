    if (v.kind!=="prep") continue;
    if (d < new Date(toDate(v.startDate).getTime()+7*86400000)) continue;
    if (v.endDate && d > toDate(v.endDate)) continue;
    return true;
  }
  return false;
}
function isDoxyPEPFor(vacc, dateStr) {
  const d = toDate(dateStr);
  for (const v of vacc) {
    if (v.kind!=="doxypep") continue;
    if (Math.abs(d - toDate(v.date))/3600000 <= 72) return true;
  }
  return false;
}

// ═══════════════════════════════════════════════════════════════
// RISK CALCULATION
// ═══════════════════════════════════════════════════════════════
function calcRisks(intercourse, tests, vacc, country) {
  const today = new Date();
  const sortedTests = [...tests].sort((a,b)=>toDate(b.date)-toDate(a.date));
  const lastTest = sortedTests[0]||null;
  const cut = lastTest ? new Date(toDate(lastTest.date).getTime()+86400000-1) : null;
  const rel = intercourse.filter(e=>!cut||toDate(e.date)>cut);
  const vacProt = getVaccineProtection(vacc);
  const hp = HIGH_PREV[country]||[];

  const lastTestedMap = {};
  for (const sti of STI_NAMES) {
    for (const t of sortedTests) { if (t.ts[sti]) { lastTestedMap[sti] = { date:t.date, result:t.results?.[sti]||"negative" }; break; } }
  }

  const risks = {};
  for (const [sn, si] of Object.entries(STI_DB)) {
    if (vacProt[sn]) { risks[sn]={exposed:false,vaccinated:true}; continue; }
    const exps = [];
    for (const e of rel) {
      for (const [type, active] of Object.entries(e.t)) {
        if (!active) continue;
        const tr = si.tx[type]; if (!tr||tr.p===0) continue;
        let rate = e.p[type] ? tr.p*(1-tr.c) : tr.p;
        if (sn==="HIV"&&isPrEPActiveOn(vacc,e.date)) continue;
        if (["Gonorrhea","Chlamydia","Syphilis"].includes(sn)&&isDoxyPEPFor(vacc,e.date)) rate*=0.25;
        if (rate>0.00001) exps.push({date:toDate(e.date),type,isP:!!e.p[type],rl:tr.r,rate,cid:e.cid});
      }
    }
    if (!exps.length) { risks[sn]={exposed:false}; continue; }
    const lat = exps.reduce((a,b)=>a.date>b.date?a:b);
    const days = Math.floor((today-lat.date)/86400000);
    const mr = exps.reduce((m,e)=>RO[e.rl]>RO[m]?e.rl:m,"none");
    const isPositive = lastTestedMap[sn]?.result==="positive";
    risks[sn] = { exposed:true, testable:days>=si.wd, wPct:Math.min(days/si.wd,1), days, mr, sym:si.sym, wd:si.wd, n:exps.length, allP:exps.every(e=>e.isP), highPrev:hp.includes(sn), isPositive, contactIds:[...new Set(exps.map(e=>e.cid).filter(Boolean))] };
  }
  return { lastTest, risks, lastTestedMap };
}

// Compute contacts to notify per positive STI (contacts between prev negative and positive test)
function getNotifiableContacts(tests, intercourse, contacts) {
  const sorted = [...tests].sort((a,b)=>toDate(a.date)-toDate(b.date));
  const alerts = []; // [{sti, testDate, contacts: [{contact, status}]}]
  for (const test of sorted) {
    if (!test.results) continue;
    for (const [sti, result] of Object.entries(test.results)) {
      if (result !== "positive") continue;
      const prevNeg = sorted.filter(t=>toDate(t.date)<toDate(test.date)&&t.results?.[sti]==="negative").sort((a,b)=>toDate(b.date)-toDate(a.date))[0];
      const afterDate = prevNeg ? prevNeg.date : "2000-01-01";
      const cids = [...new Set(intercourse.filter(e=>e.date>afterDate&&e.date<=test.date&&e.cid).map(e=>e.cid))];
      const cs = cids.map(cid=>contacts.find(c=>c.id===cid)).filter(Boolean);
      if (cs.length || cids.length === 0) {
        alerts.push({ sti, testDate: test.date, contacts: cs, hasAnonymous: intercourse.some(e=>e.date>afterDate&&e.date<=test.date&&!e.cid) });
      }
    }
  }
  return alerts;
}

  const [icProt,setIcProt]=useState(editData?.p?{...editData.p}:EMPTY_ACTS());

  const [teFac,setTeFac]=useState(editData?.fac||"");

    let saved = null;

    else if (tab==="test") { const res={}; Object.entries(teStis).forEach(([k,v])=>{if(v)res[k]=teResults[k]||"negative";}); saved={...(editData||{}),id:editData?.id||genId("t"),date:teDate,fac:teFac,num:teNum,ts:{...teStis},results:res}; onSave("test",saved); }
    else if (tab==="contact") { saved={...(editData||{}),id:editData?.id||genId("c"),name:cName,notes:cNotes||null,token:cToken,cx:{...cCx}}; onSave("contact",saved); }
    else if (tab==="vaccination") {
      const base={id:editData?.id||genId("v"),kind:vKind};
      if (vKind==="vaccine") Object.assign(base,{type:vType,date:vDate,manufacturer:vMfr,dose:vDose});
      else if (vKind==="prep") Object.assign(base,{startDate:vStart,endDate:vOngoing?null:vEnd});
      else if (vKind==="doxypep") Object.assign(base,{date:vDate});
      saved=base; onSave("vaccination",base);
    }
    onClose(saved, tab);

  const handleDelete = () => { if (editData&&confirm(t("confirmDelete"))) { onDelete(tab,editData.id); onClose(null,null); } };

        {!vOngoing&&<div>{fl(t("endDate"))}<Input type="date" value={vEnd} onChange={setVEnd}/></div>}
      </>}
      {vKind==="doxypep"&&<div>{fl(t("dateTaken"))}<Input type="date" value={vDate} onChange={setVDate}/></div>}
    </div>}
    <div style={{display:"flex",gap:10,marginTop:24}}>
      {isEdit&&<Btn onClick={handleDelete} danger variant="outline" style={{flex:1}}>{t("delete")}</Btn>}
      <Btn onClick={handleSave} full style={{flex:isEdit?2:1}}>{t("save")}</Btn>
    </div>
  </BottomSheet>;
}

// PARTNER ALERTS PAGE
// ═══════════════════════════════════════════════════════════════
function PartnerAlertsView({alerts, onBack}) {
  const {t, lang} = useLang();
  // Per-contact notification status: pending → notified → confirmed → testedNegative
  const [statuses, setStatuses] = useState({}); // { "sti:contactId": "pending"|"notified"|"confirmed"|"testedNegative" }
  const [personal, setPersonal] = useState({}); // { "sti:contactId": true }

  const statusKey = (sti, cid) => `${sti}:${cid}`;
  const getStatus = (sti, cid) => statuses[statusKey(sti,cid)] || "pending";

  const sendNotify = (sti, contact) => {
    const key = statusKey(sti, contact.id);
    // Simulated: POST to server with contact.token + sti info
    console.log(`[SERVER] POST /notify { token: "${contact.token}", sti: "${sti}" }`);
    setStatuses(s => ({...s, [key]: "notified"}));
    // Simulate: server confirms the person acknowledged after 3s
    setTimeout(() => setStatuses(s => ({...s, [key]: "confirmed"})), 3000);
    // Simulate: tested negative after 8s
    setTimeout(() => setStatuses(s => ({...s, [key]: "testedNegative"})), 8000);
  };

  const statusColors = { pending: P.muted, notified: P.amber, confirmed: P.teal, testedNegative: P.green };
  const statusLabels = { pending: t("pending"), notified: t("awaitingResponse"), confirmed: t("contactConfirmed"), testedNegative: t("testedNegative") };
  const statusIcons = { pending: "○", notified: "◔", confirmed: "◑", testedNegative: "●" };

  return <div style={{flex:1,overflowY:"auto",padding:"28px 16px 100px"}}>
    <button onClick={onBack} style={{background:"none",border:"none",fontFamily:fnt,fontSize:14,color:P.teal,fontWeight:600,cursor:"pointer",padding:"0 0 16px",display:"block"}}>{t("back")}</button>
    <h1 style={{fontFamily:fnt,fontSize:28,fontWeight:700,color:P.text,margin:"0 0 8px"}}>{t("partnerAlertsPage")}</h1>

    {alerts.length === 0 && <p style={{fontFamily:fnt,fontSize:14,color:P.muted,marginTop:16}}>No positive results to report.</p>}

    {alerts.map((alert, ai) => (
      <div key={ai} style={{marginTop:20}}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
          <Tag color={P.rose} filled>{alert.sti} +</Tag>
          <span style={{fontFamily:fnt,fontSize:12,color:P.muted}}>{fdFull(alert.testDate, lang)}</span>
        </div>
        <div style={{fontFamily:fnt,fontSize:13,color:P.muted,lineHeight:1.6,marginBottom:16}}>
          {t("partnerAlertsExplain",{sti:alert.sti})}
        </div>

        {alert.contacts.length === 0 && (
          <div style={{fontFamily:fnt,fontSize:13,color:P.muted,fontStyle:"italic",padding:"12px 0"}}>{t("noContactsToNotify")}</div>
        )}

        {alert.contacts.map(contact => {
          const key = statusKey(alert.sti, contact.id);
          const status = getStatus(alert.sti, contact.id);
          const isPersonal = personal[key];
          const sc = statusColors[status];

          return <div key={contact.id} style={{background:P.card,borderRadius:16,padding:"16px 18px",marginBottom:10,border:`1px solid ${P.border}`,boxShadow:"0 1px 4px rgba(0,0,0,.04)"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
              <div>
                <div style={{fontFamily:fnt,fontWeight:700,fontSize:15,color:P.text}}>{contact.name}</div>
                <div style={{fontFamily:"monospace",fontSize:10,color:P.muted,marginTop:2}}>{t("anonymousToken")}: {contact.token.slice(0,8)}…</div>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:6}}>
                <span style={{fontSize:14,color:sc}}>{statusIcons[status]}</span>
                <span style={{fontFamily:fnt,fontSize:11,fontWeight:600,color:sc}}>{statusLabels[status]}</span>
              </div>
            </div>

            {status === "pending" && !isPersonal && (
              <Btn onClick={() => sendNotify(alert.sti, contact)} color={P.rose} full small>
                {t("notifyAnonymously")}
              </Btn>
            )}

            {status === "notified" && (
              <div style={{padding:"10px 14px",borderRadius:10,background:`${P.amber}10`,border:`1px solid ${P.amber}30`,textAlign:"center"}}>
                <span style={{fontFamily:fnt,fontSize:12,color:P.amber,fontWeight:600}}>{t("awaitingResponse")}</span>
                <div style={{fontFamily:fnt,fontSize:11,color:P.muted,marginTop:4}}>
                  {lang === "de" ? "Die Person wurde über den Server informiert" : "The person has been notified via the server"}
                </div>
              </div>
            )}

            {status === "confirmed" && (
              <div style={{padding:"10px 14px",borderRadius:10,background:`${P.teal}10`,border:`1px solid ${P.teal}30`,textAlign:"center"}}>
                <span style={{fontFamily:fnt,fontSize:12,color:P.teal,fontWeight:600}}>✓ {t("contactConfirmed")}</span>
              </div>
            )}

            {status === "testedNegative" && (
              <div style={{padding:"10px 14px",borderRadius:10,background:`${P.green}10`,border:`1px solid ${P.green}30`,textAlign:"center"}}>
                <span style={{fontFamily:fnt,fontSize:12,color:P.green,fontWeight:600}}>✓ {t("testedNegative")}</span>
              </div>
            )}

            <div style={{marginTop:10}}>
              <Checkbox checked={!!isPersonal} onChange={v=>setPersonal(p=>({...p,[key]:v}))} label={t("notifiedPersonally")} color={P.green}/>
            </div>
          </div>;
        })}

        {alert.hasAnonymous && (
          <div style={{fontFamily:fnt,fontSize:12,color:P.muted,fontStyle:"italic",padding:"8px 0"}}>
            {lang === "de" ? "Hinweis: Einige Einträge waren anonym und können nicht benachrichtigt werden." : "Note: Some entries were anonymous and cannot be notified."}
          </div>
        )}
      </div>
    ))}
  </div>;
}

      {data.sym.map((s,i)=><div key={i} style={{display:"flex",gap:8,alignItems:"flex-start",marginBottom:7}}>

      <a href={WIKI_LINKS[name]} target="_blank" rel="noopener noreferrer" style={{fontFamily:fnt,fontSize:12,color:P.teal,fontWeight:600,textDecoration:"none",display:"inline-block",marginTop:6}}>{t("moreInfo")}</a>

// DASHBOARD
// ═══════════════════════════════════════════════════════════════
function DashboardView({intercourse,tests,vaccinations,contacts,country,onOpenAlerts}) {
  const {t,lang}=useLang();
  const {lastTest,risks,lastTestedMap}=calcRisks(intercourse,tests,vaccinations,country);
  const exposed=Object.entries(risks).filter(([,r])=>r.exposed&&RO[r.mr]>RO["negligible"]);
  const testNow=exposed.filter(([,r])=>r.testable);
  const daysSinceTest=lastTest?Math.floor((new Date()-toDate(lastTest.date))/86400000):null;
  const alerts = getNotifiableContacts(tests, intercourse, contacts);
  const hasAlerts = alerts.length > 0;

  return <div style={{flex:1,overflowY:"auto",padding:"28px 16px 100px"}}>
    <div style={{marginBottom:24}}>
      <h1 style={{fontFamily:fnt,fontSize:28,fontWeight:700,color:P.text,margin:"0 0 4px"}}>{t("dashboard")}</h1>
      <p style={{fontFamily:fnt,fontSize:13,color:P.muted,margin:0}}>{new Date().toLocaleDateString(lang==="de"?"de-DE":"en-GB",{weekday:"long",day:"numeric",month:"long",year:"numeric"})}</p>

    {(()=>{

        <div style={{width:40,height:40,borderRadius:12,background:`${P.rose}18`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}}>⚠</div>
        <div><div style={{fontFamily:fnt,fontWeight:700,fontSize:15,color:P.rose,marginBottom:2}}>{t("testingRecommended")}</div>
        <div style={{fontFamily:fnt,fontSize:12,color:P.muted}}>{t("testingRecommendedSub",{n:testNow.length,s:testNow.length>1?"s":""})}</div></div>
      </div>;
      if(exposed.length>0) return <div style={{background:`${P.amber}0C`,border:`1px solid ${P.amber}35`,borderRadius:16,padding:"16px 18px",marginBottom:18,display:"flex",alignItems:"center",gap:14}}>
        <div style={{width:40,height:40,borderRadius:12,background:`${P.amber}18`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}}>⏳</div>
        <div><div style={{fontFamily:fnt,fontWeight:700,fontSize:15,color:P.amber,marginBottom:2}}>{t("windowPeriod")}</div>
        <div style={{fontFamily:fnt,fontSize:12,color:P.muted}}>{t("windowPeriodSub")}</div></div>
      </div>;
      return <div style={{background:`${P.green}0C`,border:`1px solid ${P.green}35`,borderRadius:16,padding:"16px 18px",marginBottom:18,display:"flex",alignItems:"center",gap:14}}>
        <div style={{width:40,height:40,borderRadius:12,background:`${P.green}18`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}}>✓</div>
        <div><div style={{fontFamily:fnt,fontWeight:700,fontSize:15,color:P.green,marginBottom:2}}>{t("allClear")}</div>
        <div style={{fontFamily:fnt,fontSize:12,color:P.muted}}>{t("allClearSub")}</div></div>
      </div>;
    })()}

    {/* Partner Alerts button */}
    {hasAlerts && (
      <button onClick={onOpenAlerts} style={{
        width:"100%", padding:"14px 18px", borderRadius:16, marginBottom:18,
        background:`${P.rose}08`, border:`1.5px solid ${P.rose}40`,
        display:"flex", alignItems:"center", gap:14, cursor:"pointer",
        transition:"background .15s"
      }}>
        <div style={{width:40,height:40,borderRadius:12,background:`${P.rose}18`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
          <svg width={20} height={20} viewBox="0 0 24 24" fill="none" stroke={P.rose} strokeWidth={2} strokeLinecap="round" strokeLinejoin="round"><path d="M22 17H2a3 3 0 0 0 3-3V9a7 7 0 0 1 14 0v5a3 3 0 0 0 3 3zm-8.27 4a2 2 0 0 1-3.46 0"/></svg>
        </div>
        <div style={{flex:1,textAlign:"left"}}>
          <div style={{fontFamily:fnt,fontWeight:700,fontSize:14,color:P.rose}}>{t("partnerAlerts")}</div>
          <div style={{fontFamily:fnt,fontSize:12,color:P.muted}}>{t("partnerAlertsSub")}</div>
        </div>
        <span style={{color:P.rose,fontSize:18}}>›</span>
      </button>
    )}

    {/* Last test */}
    <div style={{fontFamily:fnt,fontSize:11,fontWeight:600,color:P.muted,letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:10}}>{t("lastTest")}</div>
    {lastTest?<div style={{background:P.card,borderRadius:16,padding:"16px 18px",marginBottom:24,border:`1px solid ${P.border}`,boxShadow:"0 1px 4px rgba(0,0,0,.04)"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
        <div><div style={{fontFamily:fnt,fontWeight:700,fontSize:15,color:P.text,marginBottom:3}}>{lastTest.fac}</div>
        <div style={{fontFamily:fnt,fontSize:12,color:P.muted}}>{fdFull(lastTest.date,lang)} · #{lastTest.num}</div></div>
        <div style={{fontFamily:fnt,fontSize:12,color:P.teal,fontWeight:600}}>{t("daysAgo",{n:daysSinceTest})}</div>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:6}}>
        {STI_NAMES.map(sti=>{const info=lastTestedMap[sti];const isR=risks[sti]?.exposed&&RO[risks[sti]?.mr]>RO["negligible"];
          return <div key={sti} style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <span style={{fontFamily:fnt,fontSize:12,color:isR?P.text:P.muted,fontWeight:isR?600:400}}>{sti}</span>
            <span style={{fontFamily:fnt,fontSize:11,color:info?(info.result==="positive"?P.rose:P.muted):P.muted}}>{info?fdFull(info.date,lang):t("notTested")}{info?.result==="positive"&&" ⚠"}</span>
          </div>;
        })}
      </div>
    </div>:<div style={{background:P.card,borderRadius:16,padding:"16px 18px",marginBottom:24,border:`1px solid ${P.border}`}}>
      <div style={{fontFamily:fnt,fontSize:13,color:P.muted}}>{t("noTests")}</div>
    </div>}

    {/* Risk cards */}
    {exposed.length>0&&<>
      <div style={{fontFamily:fnt,fontSize:11,fontWeight:600,color:P.muted,letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:10}}>
        {t("riskAssessment")} · <span style={{fontWeight:400}}>{t("sinceLastTest")} · {t("tapExpand")}</span>
      </div>
      {exposed.sort(([,a],[,b])=>RO[b.mr]-RO[a.mr]).map(([name,data])=><RiskCard key={name} name={name} data={data}/>)}
    </>}
  </div>;
}

// ═══════════════════════════════════════════════════════════════
// CALENDAR
// ═══════════════════════════════════════════════════════════════
function CalendarView({intercourse,tests,vaccinations,contacts,onEdit}) {
  const {t,lang}=useLang();
  const today=new Date();
  const [yr,setYr]=useState(today.getFullYear());
  const [mo,setMo]=useState(today.getMonth());
  const [animKey,setAnimKey]=useState(0);
  const [selected,setSelected]=useState(null);
  const txRef=useRef(null);
  const months=t("months"); const daysShort=t("daysShort");
  const changeMonth=dir=>{setAnimKey(k=>k+1);if(dir>0){if(mo===11){setMo(0);setYr(y=>y+1);}else setMo(m=>m+1);}else{if(mo===0){setMo(11);setYr(y=>y-1);}else setMo(m=>m-1);}};
  const daysInMonth=new Date(yr,mo+1,0).getDate();
  let startDow=new Date(yr,mo,1).getDay(); startDow=startDow===0?6:startDow-1;
  const cells=[...Array(startDow).fill(null),...Array.from({length:daysInMonth},(_,i)=>i+1)];
  const dateStr=d=>`${yr}-${String(mo+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
  const isToday=d=>d===today.getDate()&&mo===today.getMonth()&&yr===today.getFullYear();
  const dayHas=d=>{const s=dateStr(d);return{ic:intercourse.some(e=>e.date===s),te:tests.some(e=>e.date===s),vx:vaccinations.some(e=>e.date===s||e.startDate===s)};};

  return <div style={{flex:1,overflowY:"auto",padding:"28px 16px 100px"}}>
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:24}}>
      <h1 style={{margin:0,fontFamily:fnt,fontSize:28,fontWeight:700,color:P.text}}>{months[mo]}<span style={{color:P.muted,fontWeight:300}}> {yr}</span></h1>
      <div style={{display:"flex",gap:6}}>
        {["←","→"].map((a,i)=><button key={a} onClick={()=>changeMonth(i===0?-1:1)} style={{ width:36,height:36,borderRadius:10,background:P.card,border:`1px solid ${P.border}`, color:P.text,fontSize:14,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center", boxShadow:"0 1px 3px rgba(0,0,0,.04)" }}>{a}</button>)}
      </div>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(7, 1fr)",marginBottom:6}}>
      {daysShort.map(d=><div key={d} style={{textAlign:"center",fontFamily:fnt,fontSize:11,fontWeight:600,color:P.muted,letterSpacing:"0.05em",paddingBottom:8}}>{d}</div>)}
    </div>
    <div key={animKey} style={{display:"grid",gridTemplateColumns:"repeat(7, 1fr)",gap:3,animation:"calIn .22s ease"}}
      onTouchStart={e=>{txRef.current=e.touches[0].clientX;}}
      onTouchEnd={e=>{if(!txRef.current)return;const dx=e.changedTouches[0].clientX-txRef.current;if(Math.abs(dx)>45)changeMonth(dx<0?1:-1);txRef.current=null;}}>
      {cells.map((d,i)=>{
        if(!d) return <div key={`e${i}`}/>;
        const evs=dayHas(d); const hasAny=evs.ic||evs.te||evs.vx;
        return <div key={dateStr(d)} onClick={()=>hasAny&&setSelected(dateStr(d))} style={{
          aspectRatio:"1",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",
          borderRadius:12,cursor:hasAny?"pointer":"default",position:"relative",
          background:isToday(d)?P.teal+"12":"transparent",
          border:isToday(d)?`1.5px solid ${P.teal}50`:"1.5px solid transparent",transition:"background .15s"
        }}>
          <span style={{fontFamily:fnt,fontSize:13,fontWeight:isToday(d)?700:400,color:isToday(d)?P.teal:P.text}}>{d}</span>
          {hasAny&&<div style={{display:"flex",gap:2,position:"absolute",bottom:4}}>
            {evs.ic&&<Dot color={P.rose} size={5}/>}{evs.te&&<Dot color={P.teal} size={5}/>}{evs.vx&&<Dot color={P.amber} size={5}/>}
          </div>}
        </div>;
      })}
    </div>
    <div style={{display:"flex",gap:20,marginTop:20,padding:"12px 16px",background:P.card,borderRadius:14,border:`1px solid ${P.border}`}}>
      {[[P.rose,t("legend_intercourse")],[P.teal,t("legend_test")],[P.amber,t("legend_vaccination")]].map(([color,label])=>
        <div key={label} style={{display:"flex",alignItems:"center",gap:7}}><Dot color={color} size={8}/><span style={{fontFamily:fnt,fontSize:12,color:P.muted}}>{label}</span></div>
      )}
    </div>
    {selected&&<DaySheet date={selected} intercourse={intercourse} tests={tests} vaccinations={vaccinations} contacts={contacts} onClose={()=>setSelected(null)} onEdit={(type,data)=>{setSelected(null);onEdit(type,data);}} lang={lang}/>}
  </div>;
}

// ═══════════════════════════════════════════════════════════════
// SETTINGS
// ═══════════════════════════════════════════════════════════════
function SettingsView({country,setCountry,lang,setLang,notifs,setNotifs,lock,setLock,onExport,onDeleteAll}) {
  const {t}=useLang();
  const sections=[
    {label:t("general"),items:[
      {type:"select",label:t("language"),value:lang,onChange:setLang,options:[{value:"en",label:"English"},{value:"de",label:"Deutsch"}]},
      {type:"select",label:t("region"),sub:t("regionSub"),value:country,onChange:setCountry,options:COUNTRIES.map(c=>({value:c,label:c}))},
      {type:"toggle",label:t("testReminders"),sub:t("testRemindersSub"),value:notifs,onChange:setNotifs},
      {type:"toggle",label:t("appLock"),sub:t("appLockSub"),value:lock,onChange:setLock},
    ]},
    {label:t("data"),items:[
      {type:"action",label:t("exportData"),sub:t("exportDataSub"),icon:"↓",onClick:onExport},
      {type:"action",label:t("deleteAllData"),sub:t("deleteAllDataSub"),icon:"⊗",danger:true,onClick:onDeleteAll},
    ]},
    {label:t("about"),items:[
      {type:"info",label:t("version"),value:"0.2.0 prototype"},
      {type:"info",label:t("storage"),value:t("storageValue")},
      {type:"action",label:t("medicalDisclaimer"),sub:t("medicalDisclaimerSub"),icon:"›"},
    ]},
  ];
  return <div style={{flex:1,overflowY:"auto",padding:"28px 16px 100px"}}>
    <h1 style={{fontFamily:fnt,fontSize:28,fontWeight:700,color:P.text,margin:"0 0 24px"}}>{t("settings")}</h1>
    {sections.map(section=><div key={section.label} style={{marginBottom:24}}>
      <div style={{fontFamily:fnt,fontSize:11,fontWeight:600,color:P.muted,letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:10}}>{section.label}</div>
      <div style={{background:P.card,borderRadius:16,overflow:"hidden",border:`1px solid ${P.border}`,boxShadow:"0 1px 4px rgba(0,0,0,.04)"}}>
        {section.items.map((item,i)=><div key={item.label} onClick={item.onClick} style={{
          padding:"14px 18px",borderBottom:i<section.items.length-1?`1px solid ${P.border}`:"none",
          display:"flex",alignItems:"center",justifyContent:"space-between",gap:12,
          cursor:item.onClick?"pointer":"default"
        }}>
          <div style={{flex:1}}>
            <div style={{fontFamily:fnt,fontSize:14,fontWeight:500,color:item.danger?P.rose:P.text}}>{item.label}</div>
            {item.sub&&<div style={{fontFamily:fnt,fontSize:12,color:P.muted,marginTop:2,lineHeight:1.4}}>{item.sub}</div>}
          </div>
          {item.type==="select"&&<select value={item.value} onChange={e=>item.onChange(e.target.value)} style={{
            background:P.cardEl,border:`1px solid ${P.border}`,borderRadius:8,
            color:P.text,fontFamily:fnt,fontSize:12,padding:"6px 10px",cursor:"pointer",outline:"none",maxWidth:150
          }}>{item.options.map(o=>typeof o==="string"?<option key={o} value={o}>{o}</option>:<option key={o.value} value={o.value}>{o.label}</option>)}</select>}
          {item.type==="toggle"&&<Toggle value={item.value} onChange={item.onChange}/>}
          {item.type==="info"&&<span style={{fontFamily:fnt,fontSize:12,color:P.muted,textAlign:"right",maxWidth:160}}>{item.value}</span>}
          {item.type==="action"&&<span style={{color:item.danger?P.rose:P.muted,fontSize:16,flexShrink:0}}>{item.icon}</span>}
        </div>)}
      </div>
    </div>)}
  </div>;
}

// ═══════════════════════════════════════════════════════════════
// FAB — expandable with 4 sub-actions
// ═══════════════════════════════════════════════════════════════
function FAB({onAdd}) {
  const {t} = useLang();
  const [open, setOpen] = useState(false);
  const items = [
    { id:"intercourse", color:P.rose, label:t("intercourse"), icon:<svg width={18} height={18} viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth={2} strokeLinecap="round" strokeLinejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg> },
    { id:"test", color:P.teal, label:t("testEntry"), icon:<svg width={18} height={18} viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth={2} strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg> },
    { id:"contact", color:"#6B6B80", label:t("contact"), icon:<svg width={18} height={18} viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth={2} strokeLinecap="round" strokeLinejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg> },
    { id:"vaccination", color:P.amber, label:t("vaccination"), icon:<svg width={18} height={18} viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth={2} strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg> },
  ];

  return <>
    {/* Backdrop when open */}
    {open && <div onClick={()=>setOpen(false)} style={{position:"fixed",inset:0,zIndex:38,background:"rgba(0,0,0,.15)"}}/>}

    {/* Sub-buttons */}
    {open && items.map((item, i) => (
      <button key={item.id} onClick={()=>{setOpen(false);onAdd(item.id);}}
        style={{
          position:"fixed", bottom: 80 + (i+1)*58, right:"calc(50% - 195px)",
          width:44, height:44, borderRadius:14,
          background:item.color, border:"none", color:"#fff",
          cursor:"pointer", boxShadow:`0 3px 12px ${item.color}40`,
          zIndex:39, display:"flex", alignItems:"center", justifyContent:"center",
          animation:`fabItem .2s ease ${i*0.04}s both`,
        }}>
        {item.icon}
      </button>
    ))}
    {/* Labels */}
    {open && items.map((item, i) => (
      <div key={`l-${item.id}`} style={{
        position:"fixed", bottom: 80 + (i+1)*58 + 10, right:"calc(50% - 195px + 54px)",
        fontFamily:fnt, fontSize:12, fontWeight:600, color:P.text,
        background:P.card, padding:"4px 10px", borderRadius:8,
        boxShadow:"0 2px 8px rgba(0,0,0,.1)", zIndex:39,
        animation:`fabItem .2s ease ${i*0.04}s both`, whiteSpace:"nowrap",
      }}>
        {item.label}
      </div>
    ))}

    {/* Main FAB */}
    <button onClick={()=>setOpen(o=>!o)} style={{
      position:"fixed", bottom:76, right:"calc(50% - 195px)", width:52, height:52, borderRadius:16,
      background:P.teal, border:"none", color:"#fff", fontSize:26, fontWeight:300,
      cursor:"pointer", boxShadow:"0 4px 16px rgba(42,149,153,.35)", zIndex:39,
      display:"flex", alignItems:"center", justifyContent:"center", lineHeight:1,
      transition:"transform .25s cubic-bezier(.32,.72,0,1)",
      transform: open ? "rotate(45deg)" : "rotate(0deg)",
    }}>
      +
    </button>
  </>;
}

// ═══════════════════════════════════════════════════════════════
// BOTTOM NAV
// ═══════════════════════════════════════════════════════════════
function BottomNav({view,setView}) {
  const {t}=useLang();
  const tabs=[
    {id:"dashboard",label:t("dashboard"),icon:<svg width={22} height={22} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={1.8} strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>},
    {id:"calendar",label:t("calendar"),icon:<svg width={22} height={22} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={1.8} strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>},
    {id:"settings",label:t("settings"),icon:<svg width={22} height={22} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={1.8} strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>},
  ];
  return <nav style={{ position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)", width:"100%",maxWidth:430,background:P.bg+"F0", borderTop:`1px solid ${P.border}`,display:"flex", paddingBottom:"env(safe-area-inset-bottom, 8px)",zIndex:40,backdropFilter:"blur(20px)" }}>
    {tabs.map(tab=><button key={tab.id} onClick={()=>setView(tab.id)} style={{
      flex:1,padding:"10px 0 8px",background:"none",border:"none",
      display:"flex",flexDirection:"column",alignItems:"center",gap:4,
      cursor:"pointer",color:view===tab.id?P.teal:P.muted,transition:"color .2s"
    }}>{tab.icon}<span style={{fontFamily:fnt,fontSize:10,letterSpacing:"0.05em",fontWeight:view===tab.id?600:400}}>{tab.label}</span></button>)}

// ═══════════════════════════════════════════════════════════════
// APP
// ═══════════════════════════════════════════════════════════════
function App() {
  const [view,setView]=useState("dashboard");
  const [lang,setLang]=useState("en");
  const [country,setCountry]=useState("Germany");
  const [notifs,setNotifs]=useState(false);
  const [lock,setLock]=useState(true);
  const [contacts,setContacts]=useState(INIT_CONTACTS);
  const [intercourse,setIntercourse]=useState(INIT_INTERCOURSE);
  const [tests,setTests]=useState(INIT_TESTS);
  const [vaccinations,setVaccinations]=useState(INIT_VACCINATIONS);
  const [showAdd,setShowAdd]=useState(null); // null | { tab } for new, or { type, data } for edit
  const [positivePopup,setPositivePopup]=useState(null); // null or {stis:[...]}
  const [showAlerts,setShowAlerts]=useState(false);
  const t=tFn(lang);

  useEffect(()=>{
    const link=document.createElement("link");link.rel="stylesheet";
    link.href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap";
    document.head.appendChild(link);
    const style=document.createElement("style");
    style.textContent=`*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}body{background:${P.bg};overflow:hidden;font-family:'DM Sans',sans-serif;}::-webkit-scrollbar{display:none;}button:focus{outline:none;}select option{background:${P.card};}@keyframes calIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}@keyframes slideUp{from{transform:translate(-50%,100%)}to{transform:translate(-50%,0)}}@keyframes popIn{from{opacity:0;transform:translate(-50%,-50%) scale(.92)}to{opacity:1;transform:translate(-50%,-50%) scale(1)}}@keyframes fabItem{from{opacity:0;transform:translateY(10px) scale(.8)}to{opacity:1;transform:translateY(0) scale(1)}}`;
    document.head.appendChild(style);
  },[]);

  const handleSave=(type,data)=>{
    const update=setter=>setter(prev=>{const idx=prev.findIndex(e=>e.id===data.id);if(idx>=0){const n=[...prev];n[idx]=data;return n;}return[...prev,data];});
    if(type==="intercourse")update(setIntercourse);else if(type==="test")update(setTests);else if(type==="contact")update(setContacts);else if(type==="vaccination")update(setVaccinations);
  };
  const handleDelete=(type,id)=>{
    const rm=setter=>setter(prev=>prev.filter(e=>e.id!==id));
    if(type==="intercourse")rm(setIntercourse);else if(type==="test")rm(setTests);else if(type==="contact")rm(setContacts);else if(type==="vaccination")rm(setVaccinations);
  };

  // Called when AddEditSheet closes (savedData, savedType)
  const handleSheetClose = (savedData, savedType) => {
    setShowAdd(null);
    // Check if a test was just saved with positive results → show popup
    if (savedType === "test" && savedData?.results) {
      const positiveStis = Object.entries(savedData.results).filter(([,r])=>r==="positive").map(([k])=>k);
      if (positiveStis.length > 0) {
        setPositivePopup({ stis: positiveStis });
      }
    }
  };

  const handleExport=()=>{const d=JSON.stringify({contacts,intercourse,tests,vaccinations},null,2);const b=new Blob([d],{type:"application/json"});const u=URL.createObjectURL(b);const a=document.createElement("a");a.href=u;a.download="sexual-health-data.json";a.click();URL.revokeObjectURL(u);};
  const handleDeleteAll=()=>{if(confirm(lang==="de"?"Alle Daten unwiderruflich löschen?":"Permanently delete all data?")){setContacts([]);setIntercourse([]);setTests([]);setVaccinations([]);}};

  const alerts = getNotifiableContacts(tests, intercourse, contacts);

  return <LangContext.Provider value={{lang,t}}>
    <div style={{display:"flex",flexDirection:"column",height:"100vh",maxWidth:430,margin:"0 auto",background:P.bg,position:"relative",overflow:"hidden"}}>
      {/* Partner Alerts is a full-page overlay */}
      {showAlerts ? (
        <PartnerAlertsView alerts={alerts} onBack={()=>setShowAlerts(false)}/>
      ) : (<>
        {view==="dashboard"&&<DashboardView intercourse={intercourse} tests={tests} vaccinations={vaccinations} contacts={contacts} country={country} onOpenAlerts={()=>setShowAlerts(true)}/>}
        {view==="calendar"&&<CalendarView intercourse={intercourse} tests={tests} vaccinations={vaccinations} contacts={contacts} onEdit={(type,data)=>setShowAdd({type,data})}/>}
        {view==="settings"&&<SettingsView country={country} setCountry={setCountry} lang={lang} setLang={setLang} notifs={notifs} setNotifs={setNotifs} lock={lock} setLock={setLock} onExport={handleExport} onDeleteAll={handleDeleteAll}/>}
      </>)}
      <BottomNav view={view} setView={(v)=>{setShowAlerts(false);setView(v);}}/>
      {view!=="settings"&&!showAlerts&&<FAB onAdd={(tab)=>setShowAdd({tab})}/>}

      {/* Add/Edit sheet */}
      {showAdd&&<AddEditSheet
        onClose={handleSheetClose}
        onSave={handleSave}
        onDelete={handleDelete}
        contacts={contacts}
        editType={showAdd.type||null}
        editData={showAdd.data||null}
        initialTab={showAdd.tab||null}
      />}

      {/* Positive result popup */}
      {positivePopup && <PositiveResultPopup
        stis={positivePopup.stis}
        onGoToAlerts={()=>{setPositivePopup(null);setView("dashboard");setShowAlerts(true);}}
        onDismiss={()=>setPositivePopup(null)}
      />}
    </div>
  </LangContext.Provider>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
