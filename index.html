// DAY SHEET — clickable on any date
// ═══════════════════════════════════════════════════════════════
function DaySheet({date,ic,te,vx,con,onClose,onEdit,lang}){
  const{t}=useLang();const gc=id=>con.find(c=>c.id===id)||null;
  const ics=ic.filter(e=>e.date===date),tss=te.filter(e=>e.date===date),vxs=vx.filter(e=>e.date===date||e.startDate===date);
  const hasAny=ics.length||tss.length||vxs.length;
  return<Sheet onClose={onClose} title={fd(date,lang)}>
    {!hasAny&&<p style={{color:P.muted,fontSize:14,fontFamily:F,padding:"16px 0"}}>{t("noEntries")}</p>}
    {tss.map(te=><div key={te.id} style={{background:P.cardEl,borderRadius:14,padding:"14px 16px",marginBottom:10}}><div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}><Dot color={P.teal}/><span style={{fontFamily:F,fontWeight:700,fontSize:13,color:P.teal}}>{t("testEntry")}</span><span style={{fontFamily:F,fontSize:11,color:P.muted,marginLeft:"auto"}}>{te.num}</span><button onClick={()=>onEdit("test",te)} style={{background:"none",border:"none",color:P.teal,fontFamily:F,fontSize:12,fontWeight:600,cursor:"pointer",padding:4,minHeight:32}}>{t("edit")}</button></div><div style={{fontFamily:F,fontSize:12,color:P.muted,marginBottom:8}}>{te.fac}</div><div style={{display:"flex",flexWrap:"wrap",gap:4}}>{Object.entries(te.ts).filter(([,v])=>v).map(([k])=><Tag key={k} color={te.results?.[k]==="positive"?P.rose:P.teal} small>{k}{te.results?.[k]==="positive"?" +":""}</Tag>)}</div></div>)}
    {vxs.map(v=><div key={v.id} style={{background:P.cardEl,borderRadius:14,padding:"14px 16px",marginBottom:10}}><div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}><Dot color={P.amber}/><span style={{fontFamily:F,fontWeight:700,fontSize:13,color:P.amber}}>{v.kind==="vaccine"?`${v.type} ${t("vaccine")}`:v.kind==="prep"?"PrEP":"Doxy-PEP"}</span><button onClick={()=>onEdit("vaccination",v)} style={{background:"none",border:"none",color:P.amber,fontFamily:F,fontSize:12,fontWeight:600,cursor:"pointer",marginLeft:"auto",padding:4,minHeight:32}}>{t("edit")}</button></div>{v.kind==="vaccine"&&<div style={{fontFamily:F,fontSize:12,color:P.muted}}>{v.manufacturer} · {t("dose")} {v.dose}</div>}{v.kind==="prep"&&<div style={{fontFamily:F,fontSize:12,color:P.muted}}>{fd(v.startDate,lang)}{v.endDate?` — ${fd(v.endDate,lang)}`:` (${t("ongoing")})`}</div>}</div>)}
    {ics.map(e=>{const c=gc(e.cid);const at=Object.entries(e.t).filter(([,v])=>v);return<div key={e.id} style={{background:P.cardEl,borderRadius:14,padding:"14px 16px",marginBottom:10}}><div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}><Dot color={P.rose}/><span style={{fontFamily:F,fontWeight:700,fontSize:13,color:P.rose}}>{c?c.name:t("anonymousPartner")}</span><button onClick={()=>onEdit("intercourse",e)} style={{background:"none",border:"none",color:P.rose,fontFamily:F,fontSize:12,fontWeight:600,cursor:"pointer",marginLeft:"auto",padding:4,minHeight:32}}>{t("edit")}</button></div><div style={{display:"flex",flexDirection:"column",gap:6}}>{at.map(([ty])=><div key={ty} style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><span style={{fontFamily:F,fontSize:13,color:P.text}}>{t(ty)}</span><Tag color={e.p[ty]?P.green:P.rose} small>{e.p[ty]?t("protected"):t("unprotected")}</Tag></div>)}</div></div>;})}
  </Sheet>;
}

// ADD / EDIT — anatomy gating with reversible note

function AddEdit({onClose,onSave,onDel,con,eType,eData,initTab,pPref}){
  const{t}=useLang();const isE=!!eData;const[tab,sTab]=useState(eType||initTab||"intercourse");
  const[iD,sID]=useState(eData?.date||ds(new Date()));const[iA,sIA]=useState(isE?!eData.cid:false);const[iC,sIC]=useState(eData?.cid||"");
  const[acts,sActs]=useState(eData?.t?{...eData.t}:EMPTY());const[prot,sProt]=useState(eData?.p?{...eData.p}:EMPTY());
  const[tD,sTD]=useState(eData?.date||ds(new Date()));const[tF,sTF]=useState(eData?.fac||"");const[tN,sTN]=useState(eData?.num||"");
  const[tS,sTS]=useState(eData?.ts?{...eData.ts}:Object.fromEntries(STI_N.map(s=>[s,0])));const[tR,sTR]=useState(eData?.results?{...eData.results}:{});
  const[cN,sCN]=useState(eData?.name||"");const[cNo,sCNo]=useState(eData?.notes||"");const[cT,sCT]=useState(eData?.token||genTok());const[cX,sCX]=useState(eData?.cx?{...eData.cx}:{});
  const[vK,sVK]=useState(eData?.kind||"vaccine");const[vT,sVT]=useState(eData?.type||"Hep B");const[vD,sVD]=useState(eData?.date||ds(new Date()));
  const[vM,sVM]=useState(eData?.manufacturer||"");const[vDo,sVDo]=useState(eData?.dose||1);const[vS,sVS]=useState(eData?.startDate||ds(new Date()));const[vE,sVE]=useState(eData?.endDate||"");const[vO,sVO]=useState(eData?!eData.endDate:true);
  const[actNote,sAN]=useState(null);
  useEffect(()=>{if(eType)sTab(eType);},[eType]);
  const isGrey=k=>{if(pPref==="both"||!pPref)return false;const need=ACT_NEEDS[k];return need?need!==pPref:false;};
  const doSave=()=>{let sv=null;
    if(tab==="intercourse"){sv={...(eData||{}),id:eData?.id||gid("i"),date:iD,cid:iA?null:(iC||null),t:{...acts},p:{...prot}};onSave("intercourse",sv);}
    else if(tab==="test"){const rs={};Object.entries(tS).forEach(([k,v])=>{if(v)rs[k]=tR[k]||"negative";});sv={...(eData||{}),id:eData?.id||gid("t"),date:tD,fac:tF,num:tN,ts:{...tS},results:rs};onSave("test",sv);}
    else if(tab==="contact"){sv={...(eData||{}),id:eData?.id||gid("c"),name:cN,notes:cNo||null,token:cT,cx:{...cX}};onSave("contact",sv);}
    else if(tab==="vaccination"){const b={id:eData?.id||gid("v"),kind:vK};if(vK==="vaccine")Object.assign(b,{type:vT,date:vD,manufacturer:vM,dose:vDo});else if(vK==="prep")Object.assign(b,{startDate:vS,endDate:vO?null:vE});else b.date=vD;sv=b;onSave("vaccination",b);}
    onClose(sv,tab);};
  return<Sheet onClose={()=>onClose(null,null)} title={isE?t("editEntry"):t("addEntry")}>
    {!isE&&<button onClick={()=>alert(t("qrAlert"))} style={{width:"100%",padding:"12px",borderRadius:12,marginBottom:16,background:P.cardEl,border:"1.5px dashed "+P.border,fontFamily:F,fontSize:13,color:P.muted,cursor:"pointer",textAlign:"center",minHeight:44}}>📱 {t("addViaQR")}</button>}
    <div style={{display:"flex",gap:6,marginBottom:22,overflowX:"auto",paddingBottom:2}}>
      {(isE?[tab]:["intercourse","test","contact","vaccination"]).map(id=><Pill key={id} active={tab===id} onClick={()=>sTab(id)}>{{intercourse:t("intercourse"),test:t("testEntry"),contact:t("contact"),vaccination:t("vaccination")}[id]}</Pill>)}
    </div>
    {tab==="intercourse"&&<div style={{display:"flex",flexDirection:"column",gap:16}}>
      <div><FL>{t("date")}</FL><Inp type="date" value={iD} onChange={sID}/></div>
      <CB checked={iA} onChange={sIA} label={t("anonymousPartner")}/>
      {!iA&&<div><FL>{t("selectContact")}</FL><Sel value={iC} onChange={sIC} placeholder={t("selectContact")} options={con.map(c=>({value:c.id,label:c.name}))}/></div>}
      <div><FL>{t("activities")}</FL>{ACT_KEYS.map(k=>{const g=isGrey(k);return<div key={k}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div onClick={()=>{if(g&&!acts[k])sAN(k);}} style={{flex:1}}>
            <CB checked={!!acts[k]} onChange={v=>{if(g&&v){sAN(k);return;}sActs(a=>({...a,[k]:v?1:0}));if(!v)sProt(p=>({...p,[k]:0}));}} label={t(k)} color={P.rose} dim={g&&!acts[k]}/>
          </div>
          {!!acts[k]&&<CB checked={!!prot[k]} onChange={v=>sProt(a=>({...a,[k]:v?1:0}))} label={t("protected")} color={P.green}/>}
        </div>
        {actNote===k&&g&&<div style={{marginLeft:32,marginBottom:10,padding:"10px 14px",borderRadius:10,background:P.amber+"0C",border:"1px solid "+P.amber+"30"}}>
          <div style={{fontFamily:F,fontSize:12,color:P.amber,lineHeight:1.5}}>{t("activityNote")}</div>
          <button onClick={()=>sAN(null)} style={{background:"none",border:"none",fontFamily:F,fontSize:12,color:P.teal,fontWeight:600,cursor:"pointer",marginTop:6,padding:0}}>{t("ok")}</button>
        </div>}
      </div>;})}</div>
    </div>}
    {tab==="test"&&<div style={{display:"flex",flexDirection:"column",gap:16}}>
      <div><FL>{t("date")}</FL><Inp type="date" value={tD} onChange={sTD}/></div>
      <div><FL>{t("facility")}</FL><Inp value={tF} onChange={sTF} placeholder={t("facility")}/></div>
      <div><FL>{t("testNumber")}</FL><Inp value={tN} onChange={sTN} placeholder="T-2026-003"/></div>
      <div><FL>{t("testedFor")}</FL>{STI_N.map(s=><div key={s} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"3px 0"}}>
        <CB checked={!!tS[s]} onChange={v=>{sTS(a=>({...a,[s]:v?1:0}));if(!v)sTR(r=>{const n={...r};delete n[s];return n;});else sTR(r=>({...r,[s]:"negative"}));}} label={s} color={P.teal}/>
        {!!tS[s]&&<div style={{display:"flex",gap:6}}>{["negative","positive"].map(r=><button key={r} onClick={()=>sTR(x=>({...x,[s]:r}))} style={{padding:"5px 14px",borderRadius:12,minHeight:32,background:tR[s]===r?(r==="positive"?P.rose:P.green):"transparent",border:`1.5px solid ${r==="positive"?P.rose:P.green}`,color:tR[s]===r?"#fff":(r==="positive"?P.rose:P.green),fontFamily:F,fontSize:11,fontWeight:600,cursor:"pointer"}}>{r==="negative"?"−":"+"}</button>)}</div>}
      </div>)}</div>
    </div>}
    {tab==="contact"&&<div style={{display:"flex",flexDirection:"column",gap:16}}>
      <div><FL>{t("name")}</FL><Inp value={cN} onChange={sCN} placeholder={t("name")}/></div>
      <div><FL>{t("notes")} ({t("optional")})</FL><Inp value={cNo} onChange={sCNo}/></div>
      <div><FL>{t("anonymousToken")}</FL><div style={{display:"flex",gap:8}}><div style={{flex:1,padding:"12px 14px",borderRadius:12,background:P.cardEl,border:"1.5px solid "+P.border,fontFamily:"monospace",fontSize:11,color:P.muted,wordBreak:"break-all",lineHeight:1.5}}>{cT}</div><button onClick={()=>sCT(genTok())} style={{padding:"0 14px",borderRadius:12,background:P.cardEl,border:"1.5px solid "+P.border,color:P.muted,fontSize:18,cursor:"pointer",flexShrink:0,minWidth:44}}>↻</button></div></div>
      <div><FL>{t("contactHandles")} ({t("optional")})</FL>{["instagram","telegram","signal","whatsapp","snapchat"].map(s=><div key={s} style={{marginBottom:10}}><span style={{fontFamily:F,fontSize:11,color:P.muted,textTransform:"capitalize",display:"block",marginBottom:4}}>{s}</span><Inp value={cX[s]||""} onChange={v=>sCX(x=>v?{...x,[s]:v}:(()=>{const n={...x};delete n[s];return n;})())} placeholder={"@"+s}/></div>)}</div>
    </div>}
    {tab==="vaccination"&&<div style={{display:"flex",flexDirection:"column",gap:16}}>
      <div><FL>{t("kind")}</FL><div style={{display:"flex",gap:6}}>{[["vaccine",t("vaccine")],["prep","PrEP"],["doxypep","Doxy-PEP"]].map(([k,l])=><Pill key={k} active={vK===k} onClick={()=>sVK(k)} color={P.amber}>{l}</Pill>)}</div></div>
      {vK==="vaccine"&&<><div><FL>{t("vaccineType")}</FL><Sel value={vT} onChange={sVT} options={["Hep B","Hep A","Mpox","HPV"]}/></div><div><FL>{t("date")}</FL><Inp type="date" value={vD} onChange={sVD}/></div><div><FL>{t("manufacturer")} ({t("optional")})</FL><Inp value={vM} onChange={sVM}/></div><div><FL>{t("doseNumber")}</FL><Sel value={String(vDo)} onChange={v=>sVDo(Number(v))} options={[1,2,3,4].map(n=>({value:String(n),label:t("dose")+" "+n}))}/></div></>}
      {vK==="prep"&&<><div><FL>{t("startDate")}</FL><Inp type="date" value={vS} onChange={sVS}/></div><CB checked={vO} onChange={sVO} label={t("ongoing")}/>{!vO&&<div><FL>{t("endDate")}</FL><Inp type="date" value={vE} onChange={sVE}/></div>}</>}
      {vK==="doxypep"&&<div><FL>{t("dateTaken")}</FL><Inp type="date" value={vD} onChange={sVD}/></div>}
    </div>}
    <div style={{display:"flex",gap:10,marginTop:24}}>
      {isE&&<Btn onClick={()=>{if(confirm(t("confirmDelete"))){onDel(tab,eData.id);onClose(null,null);}}} danger outline style={{flex:1}}>{t("delete")}</Btn>}
      <Btn onClick={doSave} full style={{flex:isE?2:1}}>{t("save")}</Btn>
    </div>
  </Sheet>;
}

function AlertsView({alerts,onBack}){const{t,lang}=useLang();const[st,sSt]=useState({});const[pr,sPr]=useState({});
const sk=(s,c)=>s+":"+c;const gs=(s,c)=>st[sk(s,c)]||"pending";
const send=(s,c)=>{const k=sk(s,c.id);sSt(x=>({...x,[k]:"notified"}));setTimeout(()=>sSt(x=>({...x,[k]:"confirmed"})),3e3);setTimeout(()=>sSt(x=>({...x,[k]:"testedNegative"})),8e3);};
const sc={pending:P.muted,notified:P.amber,confirmed:P.teal,testedNegative:P.green};
const sl={pending:t("pending"),notified:t("awaitingResponse"),confirmed:t("contactConfirmed"),testedNegative:t("testedNegative")};
const si={pending:"○",notified:"◔",confirmed:"◑",testedNegative:"●"};
return<div style={{flex:1,overflowY:"auto",padding:"28px 16px 100px"}}>

// CALENDAR — all dates clickable
// ═══════════════════════════════════════════════════════════════
function CalView({ic,te,vx,con,onEdit}){
  const{t,lang}=useLang();const today=new Date();
  const[yr,sYr]=useState(today.getFullYear());const[mo,sMo]=useState(today.getMonth());const[aK,sAK]=useState(0);const[sel,sSel]=useState(null);const txRef=useRef(null);
  const months=t("months"),dsh=t("daysShort");
  const chMo=dir=>{sAK(k=>k+1);if(dir>0){if(mo===11){sMo(0);sYr(y=>y+1);}else sMo(m=>m+1);}else{if(mo===0){sMo(11);sYr(y=>y-1);}else sMo(m=>m-1);}};
  const dim=new Date(yr,mo+1,0).getDate();let sd=new Date(yr,mo,1).getDay();sd=sd===0?6:sd-1;
  const cells=[...Array(sd).fill(null),...Array.from({length:dim},(_,i)=>i+1)];
  const dstr=d=>`${yr}-${String(mo+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
  const isT=d=>d===today.getDate()&&mo===today.getMonth()&&yr===today.getFullYear();
  const dayHas=d=>{const s=dstr(d);return{ic:ic.some(e=>e.date===s),te:te.some(e=>e.date===s),vx:vx.some(e=>e.date===s||e.startDate===s)};};
  return<div style={{flex:1,overflowY:"auto",padding:"28px 16px 100px"}}>
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:24}}>
      <h1 style={{margin:0,fontFamily:F,fontSize:26,fontWeight:700,color:P.text}}>{months[mo]}<span style={{color:P.muted,fontWeight:300}}> {yr}</span></h1>
      <div style={{display:"flex",gap:6}}>{["←","→"].map((a,i)=><button key={a} onClick={()=>chMo(i===0?-1:1)} style={{width:38,height:38,borderRadius:10,background:P.card,border:"1px solid "+P.border,color:P.text,fontSize:14,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",boxShadow:sh}}>{a}</button>)}</div>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",marginBottom:6}}>{dsh.map(d=><div key={d} style={{textAlign:"center",fontFamily:F,fontSize:11,fontWeight:700,color:P.muted,letterSpacing:".05em",paddingBottom:8}}>{d}</div>)}</div>
    <div key={aK} style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3,animation:"calIn .22s ease"}} onTouchStart={e=>{txRef.current=e.touches[0].clientX;}} onTouchEnd={e=>{if(!txRef.current)return;const dx=e.changedTouches[0].clientX-txRef.current;if(Math.abs(dx)>45)chMo(dx<0?1:-1);txRef.current=null;}}>
      {cells.map((d,i)=>{if(!d)return<div key={`e${i}`}/>;const evs=dayHas(d);const hasAny=evs.ic||evs.te||evs.vx;
        return<div key={dstr(d)} onClick={()=>sSel(dstr(d))} style={{aspectRatio:"1",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",borderRadius:12,cursor:"pointer",position:"relative",background:isT(d)?P.teal+"10":"transparent",border:isT(d)?`1.5px solid ${P.teal}50`:"1.5px solid transparent",transition:"background .15s"}}>
          <span style={{fontFamily:F,fontSize:13,fontWeight:isT(d)?700:400,color:isT(d)?P.teal:P.text}}>{d}</span>
          {hasAny&&<div style={{display:"flex",gap:2,position:"absolute",bottom:4}}>{evs.ic&&<Dot color={P.rose} size={5}/>}{evs.te&&<Dot color={P.teal} size={5}/>}{evs.vx&&<Dot color={P.amber} size={5}/>}</div>}
        </div>;})}
    </div>
    <div style={{display:"flex",gap:20,marginTop:20,padding:"12px 16px",background:P.card,borderRadius:14,border:"1px solid "+P.border}}>
      {[[P.rose,t("legend_intercourse")],[P.teal,t("legend_test")],[P.amber,t("legend_vaccination")]].map(([c,l])=><div key={l} style={{display:"flex",alignItems:"center",gap:7}}><Dot color={c} size={8}/><span style={{fontFamily:F,fontSize:12,color:P.muted}}>{l}</span></div>)}
    </div>
    {sel&&<DaySheet date={sel} ic={ic} te={te} vx={vx} con={con} onClose={()=>sSel(null)} onEdit={(ty,d)=>{sSel(null);onEdit(ty,d);}} lang={lang}/>}
  </div>;
}

// QR + SHARE VIEW

function QR({data,size=220}){const gs=25,cs=size/gs,cells=[];let h=0;for(let i=0;i<data.length;i++)h=((h<<5)-h+data.charCodeAt(i))|0;const seed=n=>{h=(h*16807+n)%2147483647;return h;};const df=(ox,oy)=>{for(let y=0;y<7;y++)for(let x=0;x<7;x++){const r=Math.max(Math.abs(x-3),Math.abs(y-3));cells.push({x:ox+x,y:oy+y,on:r===0||r===2||r===3,f:true});}};df(0,0);df(gs-7,0);df(0,gs-7);for(let i=8;i<gs-8;i++){cells.push({x:i,y:6,on:i%2===0,f:true});cells.push({x:6,y:i,on:i%2===0,f:true});}const fs=new Set(cells.map(c=>`${c.x},${c.y}`));for(let y=0;y<gs;y++)for(let x=0;x<gs;x++){if(fs.has(`${x},${y}`))continue;cells.push({x,y,on:seed(x*gs+y)%3!==0});}return<svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{borderRadius:14}}><rect width={size} height={size} fill="#fff"/>{cells.filter(c=>c.on).map((c,i)=><rect key={i} x={c.x*cs} y={c.y*cs} width={cs} height={cs} rx={c.f?0:cs*.15} fill={P.text}/>)}</svg>;}

function ShareView({sMode,sPl,sH,myTok,onScan}){const{t}=useLang();const payload=sMode==="handle"&&sPl&&sH?JSON.stringify({token:myTok,platform:sPl,handle:sH}):JSON.stringify({token:myTok});const isH=sMode==="handle"&&sPl&&sH;
return<div style={{flex:1,overflowY:"auto",padding:"28px 16px 100px",display:"flex",flexDirection:"column",alignItems:"center"}}>
  <h1 style={{fontFamily:F,fontSize:26,fontWeight:700,color:P.text,margin:"0 0 4px",alignSelf:"flex-start"}}>{t("shareTitle")}</h1>
  <p style={{fontFamily:F,fontSize:13,color:P.muted,margin:"0 0 28px",alignSelf:"flex-start"}}>{t("shareSub")}</p>
  <div style={{padding:20,background:P.card,borderRadius:24,border:"1px solid "+P.border,boxShadow:"0 2px 12px rgba(0,0,0,.06)",marginBottom:16}}><QR data={payload} size={220}/></div>
  <button onClick={onScan} style={{display:"flex",alignItems:"center",gap:10,padding:"12px 24px",borderRadius:14,background:P.teal,border:"none",cursor:"pointer",marginBottom:12,boxShadow:"0 2px 8px rgba(35,138,142,.25)",minHeight:44}}>
    <svg width={18} height={18} viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth={2} strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="12" y1="3" x2="12" y2="21"/><line x1="3" y1="12" x2="21" y2="12"/></svg>

    <svg width={18} height={18} viewBox="0 0 24 24" fill="none" stroke={P.teal} strokeWidth={2} strokeLinecap="round" strokeLinejoin="round"><path d="M6 8.32a7.43 7.43 0 0 1 0 7.36"/><path d="M9.46 6.21a11.76 11.76 0 0 1 0 11.58"/><path d="M12.91 4.1a16.07 16.07 0 0 1 0 15.8"/></svg>
    <span style={{fontFamily:F,fontSize:14,fontWeight:600,color:P.teal}}>{t("shareNFC")}</span>
  </button>
  <div style={{width:"100%",padding:"14px 18px",borderRadius:14,background:isH?P.teal+"06":P.cardEl,border:"1px solid "+(isH?P.teal+"30":P.border)}}>
    <div style={{display:"flex",alignItems:"flex-start",gap:10}}><span style={{fontSize:16,marginTop:1}}>{isH?"🔗":"🔒"}</span><div><div style={{fontFamily:F,fontSize:13,color:P.text,lineHeight:1.5}}>{isH?t("shareHandleHint",{platform:sPl,handle:sH}):t("shareTokenOnly")}</div><div style={{fontFamily:"monospace",fontSize:10,color:P.muted,marginTop:6,wordBreak:"break-all"}}>Token: {myTok}</div></div></div>
  </div>
</div>;}

function SetView({country,setCountry,lang,setLang,notifs,setNotifs,lock,setLock,onExport,onDelAll,sMode,setSMode,sPl,setSPl,sH,setSH,prof,setProf}){

  const renderSec=(label,items)=><div style={{marginBottom:24}}><SL>{label}</SL><div style={{background:P.card,borderRadius:16,overflow:"hidden",border:"1px solid "+P.border,boxShadow:sh}}>
    {items.map((item,i)=><div key={item.label||i} onClick={item.onClick} style={{padding:"14px 18px",borderBottom:i<items.length-1?"1px solid "+P.border:"none",display:"flex",alignItems:"center",justifyContent:"space-between",gap:12,cursor:item.onClick?"pointer":"default",minHeight:52}}>
      <div style={{flex:1}}><div style={{fontFamily:F,fontSize:14,fontWeight:500,color:item.danger?P.rose:P.text}}>{item.label}</div>{item.sub&&<div style={{fontFamily:F,fontSize:12,color:P.muted,marginTop:2,lineHeight:1.4}}>{item.sub}</div>}</div>
      {item.type==="select"&&<select value={item.value} onChange={e=>item.onChange(e.target.value)} style={{background:P.cardEl,border:"1px solid "+P.border,borderRadius:8,color:P.text,fontFamily:F,fontSize:12,padding:"7px 10px",cursor:"pointer",outline:"none",maxWidth:155}}>{item.options.map(o=>typeof o==="string"?<option key={o} value={o}>{o}</option>:<option key={o.value} value={o.value}>{o.label}</option>)}</select>}
      {item.type==="input"&&<input value={item.value} onChange={e=>item.onChange(e.target.value)} placeholder={item.placeholder} style={{background:P.cardEl,border:"1px solid "+P.border,borderRadius:8,color:P.text,fontFamily:F,fontSize:12,padding:"7px 10px",outline:"none",maxWidth:155,boxSizing:"border-box"}}/>}
      {item.type==="toggle"&&<Toggle value={item.value} onChange={item.onChange}/>}
      {item.type==="info"&&<span style={{fontFamily:F,fontSize:12,color:P.muted,textAlign:"right",maxWidth:160}}>{item.value}</span>}
      {item.type==="action"&&<span style={{color:item.danger?P.rose:P.muted,fontSize:16,flexShrink:0}}>{item.icon}</span>}
    </div>)}
  </div></div>;
  return<div style={{flex:1,overflowY:"auto",padding:"28px 16px 100px"}}>
    <h1 style={{fontFamily:F,fontSize:26,fontWeight:700,color:P.text,margin:"0 0 24px"}}>{t("settings")}</h1>
    {renderSec(t("profile"),[
      {type:"input",label:t("age"),value:prof.age,onChange:v=>setProf(p=>({...p,age:v})),placeholder:"e.g. 28"},
      {type:"select",label:t("partnerAnatomy"),value:prof.pa,onChange:v=>setProf(p=>({...p,pa:v})),options:[{value:"both",label:t("both")},{value:"penis",label:t("penis")},{value:"vagina",label:t("vagina")}]},
      {type:"input",label:t("knownConditions"),sub:t("knownConditionsSub"),value:prof.cond==="none"?"":prof.cond,onChange:v=>setProf(p=>({...p,cond:v||"none"})),placeholder:t("noConditions")},
    ])}
    {renderSec(t("general"),[
      {type:"select",label:t("language"),value:lang,onChange:setLang,options:[{value:"en",label:"English"},{value:"de",label:"Deutsch"}]},
      {type:"select",label:t("region"),sub:t("regionSub"),value:country,onChange:setCountry,options:COUNTRIES.map(c=>({value:c,label:c}))},
      {type:"toggle",label:t("testReminders"),sub:t("testRemindersSub"),value:notifs,onChange:setNotifs},
      {type:"toggle",label:t("appLock"),sub:t("appLockSub"),value:lock,onChange:setLock},
    ])}
    {renderSec(t("sharingPrefs"),[
      {type:"select",label:t("shareMode"),value:sMode,onChange:setSMode,options:[{value:"token",label:t("shareTokenOnlyLabel")},{value:"handle",label:t("shareWithHandle")}]},
      ...(sMode==="handle"?[{type:"select",label:t("sharePlatform"),value:sPl,onChange:setSPl,options:["instagram","telegram","signal","whatsapp","snapchat"].map(s=>({value:s,label:s[0].toUpperCase()+s.slice(1)}))},{type:"input",label:t("shareHandle"),value:sH,onChange:setSH,placeholder:"@handle"}]:[]),
    ])}
    {renderSec(t("data"),[
      {type:"action",label:t("exportData"),sub:t("exportDataSub"),icon:"↓",onClick:onExport},
      {type:"action",label:t("deleteAllData"),sub:t("deleteAllDataSub"),icon:"⊗",danger:true,onClick:onDelAll},
    ])}
    {renderSec(t("about"),[
      {type:"info",label:t("version"),value:"0.3.0 prototype"},
      {type:"info",label:t("storage"),value:t("storageValue")},
      {type:"action",label:t("medicalDisclaimer"),sub:t("medicalDisclaimerSub"),icon:"›"},
    ])}
  </div>;
}

// ═══════════════════════════════════════════════════════════════
// FAB — expandable with icons
// ═══════════════════════════════════════════════════════════════
function FAB({onAdd}){const{t}=useLang();const[open,sO]=useState(false);
const items=[{id:"intercourse",color:P.rose,l:t("intercourse"),i:<svg width={18} height={18} viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth={2} strokeLinecap="round" strokeLinejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>},{id:"test",color:P.teal,l:t("testEntry"),i:<svg width={18} height={18} viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth={2} strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>},{id:"contact",color:"#6B6B80",l:t("contact"),i:<svg width={18} height={18} viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth={2} strokeLinecap="round" strokeLinejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>},{id:"vaccination",color:P.amber,l:t("vaccination"),i:<svg width={18} height={18} viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth={2} strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>}];
return<div>
  {open&&<div onClick={()=>sO(false)} style={{position:"fixed",inset:0,zIndex:38,background:"rgba(0,0,0,.12)"}}/>}
  {open&&items.map((it,i)=><button key={it.id} onClick={()=>{sO(false);onAdd(it.id);}} style={{position:"fixed",bottom:82+(i+1)*56,right:"calc(50% - 170px)",width:46,height:46,borderRadius:14,background:it.color,border:"none",color:"#fff",cursor:"pointer",boxShadow:`0 3px 12px ${it.color}40`,zIndex:39,display:"flex",alignItems:"center",justifyContent:"center",animation:`fabItem .2s ease ${i*.04}s both`}}>{it.i}</button>)}
  {open&&items.map((it,i)=><div key={"l"+it.id} style={{position:"fixed",bottom:82+(i+1)*56+11,right:"calc(50% - 170px + 56px)",fontFamily:F,fontSize:12,fontWeight:600,color:P.text,background:P.card,padding:"5px 12px",borderRadius:8,boxShadow:"0 2px 8px rgba(0,0,0,.08)",zIndex:39,animation:`fabItem .2s ease ${i*.04}s both`,whiteSpace:"nowrap"}}>{it.l}</div>)}
  <button onClick={()=>sO(o=>!o)} style={{position:"fixed",bottom:76,right:"calc(50% - 170px)",width:54,height:54,borderRadius:16,background:P.teal,border:"none",color:"#fff",fontSize:26,fontWeight:300,cursor:"pointer",boxShadow:"0 4px 16px rgba(35,138,142,.35)",zIndex:39,display:"flex",alignItems:"center",justifyContent:"center",lineHeight:1,transition:"transform .25s cubic-bezier(.32,.72,0,1)",transform:open?"rotate(45deg)":"rotate(0deg)"}}>+</button>
</div>;}

// ═══════════════════════════════════════════════════════════════
// BOTTOM NAV — 4 tabs
// ═══════════════════════════════════════════════════════════════
function Nav({view,setView}){const{t}=useLang();
const tabs=[{id:"dashboard",l:t("dashboard"),i:<svg width={21} height={21} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={1.8} strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>},{id:"calendar",l:t("calendar"),i:<svg width={21} height={21} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={1.8} strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>},{id:"share",l:t("share"),i:<svg width={21} height={21} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={1.8} strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><rect x="7" y="7" width="3" height="3"/><rect x="14" y="7" width="3" height="3"/><rect x="7" y="14" width="3" height="3"/><rect x="14" y="14" width="3" height="3"/></svg>},{id:"settings",l:t("settings"),i:<svg width={21} height={21} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={1.8} strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>}];
return<nav style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:430,background:P.bg+"F2",borderTop:"1px solid "+P.border,display:"flex",paddingBottom:"env(safe-area-inset-bottom,8px)",zIndex:40,backdropFilter:"blur(20px)"}}>
  {tabs.map(tb=><button key={tb.id} onClick={()=>setView(tb.id)} style={{flex:1,padding:"10px 0 8px",background:"none",border:"none",display:"flex",flexDirection:"column",alignItems:"center",gap:3,cursor:"pointer",color:view===tb.id?P.teal:P.muted,transition:"color .2s",minHeight:50}}>{tb.i}<span style={{fontFamily:F,fontSize:10,letterSpacing:".04em",fontWeight:view===tb.id?700:400}}>{tb.l}</span></button>)}
</nav>;}

// ═══════════════════════════════════════════════════════════════
// APP
// ═══════════════════════════════════════════════════════════════
function App(){
  const[view,sV]=useState("dashboard");const[lang,sL]=useState("en");const[cty,sCty]=useState("Germany");
  const[notifs,sN]=useState(false);const[lock,sLk]=useState(true);
  const[con,sCon]=useState(D_C);const[ic,sIc]=useState(D_I);const[te,sTe]=useState(D_T);const[vx,sVx]=useState(D_V);
  const[showAdd,sAdd]=useState(null);const[posP,sPP]=useState(null);const[showAl,sAl]=useState(false);const[showScan,sScan]=useState(false);
  const[sMode,sSMode]=useState("token");const[sPl,sSPl]=useState("instagram");const[sH,sSH]=useState("");
  const[myTok]=useState(()=>genTok());const[prof,sProf]=useState({age:"",pa:"both",cond:"none"});
  const t=tFn(lang);
  useEffect(()=>{const lk=document.createElement("link");lk.rel="stylesheet";lk.href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap";document.head.appendChild(lk);const st=document.createElement("style");st.textContent=`*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}body{background:${P.bg};overflow:hidden;font-family:'DM Sans',sans-serif;}::-webkit-scrollbar{display:none;}button:focus{outline:none;}select option{background:${P.card};}@keyframes calIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}@keyframes slideUp{from{transform:translate(-50%,100%)}to{transform:translate(-50%,0)}}@keyframes popIn{from{opacity:0;transform:translate(-50%,-50%) scale(.92)}to{opacity:1;transform:translate(-50%,-50%) scale(1)}}@keyframes fabItem{from{opacity:0;transform:translateY(10px) scale(.8)}to{opacity:1;transform:translateY(0) scale(1)}}`;document.head.appendChild(st);},[]);
  const save=(ty,d)=>{const up=fn=>fn(p=>{const i=p.findIndex(e=>e.id===d.id);if(i>=0){const n=[...p];n[i]=d;return n;}return[...p,d];});if(ty==="intercourse")up(sIc);else if(ty==="test")up(sTe);else if(ty==="contact")up(sCon);else if(ty==="vaccination")up(sVx);};
  const del=(ty,id)=>{const rm=fn=>fn(p=>p.filter(e=>e.id!==id));if(ty==="intercourse")rm(sIc);else if(ty==="test")rm(sTe);else if(ty==="contact")rm(sCon);else if(ty==="vaccination")rm(sVx);};
  const onSheetClose=(sv,ty)=>{sAdd(null);if(ty==="test"&&sv?.results){const ps=Object.entries(sv.results).filter(([,r])=>r==="positive").map(([k])=>k);if(ps.length)sPP({stis:ps});}};
  const xport=()=>{const d=JSON.stringify({contacts:con,intercourse:ic,tests:te,vaccinations:vx,profile:prof},null,2);const b=new Blob([d],{type:"application/json"});const u=URL.createObjectURL(b);const a=document.createElement("a");a.href=u;a.download="sexual-health-data.json";a.click();URL.revokeObjectURL(u);};
  const delAll=()=>{if(confirm(lang==="de"?"Alle Daten löschen?":"Delete all data?")){sCon([]);sIc([]);sTe([]);sVx([]);}};
  const alerts=getAlerts(te,ic,con);
  return<LangContext.Provider value={{lang,t}}>
    <div style={{display:"flex",flexDirection:"column",height:"100vh",maxWidth:430,margin:"0 auto",background:P.bg,position:"relative",overflow:"hidden"}}>
      {showAl?<AlertsView alerts={alerts} onBack={()=>sAl(false)}/>:
      <div style={{display:"flex",flexDirection:"column",flex:1,overflow:"hidden"}}>
        {view==="dashboard"&&<DashView ic={ic} te={te} vx={vx} con={con} cty={cty} onAlerts={()=>sAl(true)}/>}
        {view==="calendar"&&<CalView ic={ic} te={te} vx={vx} con={con} onEdit={(ty,d)=>sAdd({type:ty,data:d})}/>}
        {view==="share"&&<ShareView sMode={sMode} sPl={sPl} sH={sH} myTok={myTok} onScan={()=>sScan(true)}/>}
        {view==="settings"&&<SetView country={cty} setCountry={sCty} lang={lang} setLang={sL} notifs={notifs} setNotifs={sN} lock={lock} setLock={sLk} onExport={xport} onDelAll={delAll} sMode={sMode} setSMode={sSMode} sPl={sPl} setSPl={sSPl} sH={sH} setSH={sSH} prof={prof} setProf={sProf}/>}
      </div>}
      <Nav view={view} setView={v=>{sAl(false);sV(v);}}/>
      {(view==="dashboard"||view==="calendar")&&!showAl&&<FAB onAdd={tab=>sAdd({tab})}/>}
      {showAdd&&<AddEdit onClose={onSheetClose} onSave={save} onDel={del} con={con} eType={showAdd.type||null} eData={showAdd.data||null} initTab={showAdd.tab||null} pPref={prof.pa}/>}
      {posP&&<PosPopup stis={posP.stis} onGo={()=>{sPP(null);sV("dashboard");sAl(true);}} onX={()=>sPP(null)}/>}
      {showScan&&<ScanPopup onClose={()=>sScan(false)} onSave={save}/>}
    </div>
  </LangContext.Provider>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
